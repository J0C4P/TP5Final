<svg width="680" height="680" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Minimalist globe with magnifying glass</title>
  <g transform="translate(340,340)" fill="none" stroke="#111">
    <clipPath id="c"><circle r="210"/></clipPath>
    <circle r="210" stroke-width="10"/>
    <ellipse rx="65"  ry="210" stroke-width="7" opacity="0.55" clip-path="url(#c)"/>
    <ellipse rx="155" ry="210" stroke-width="7" opacity="0.55" clip-path="url(#c)"/>
    <line x1="-210" x2="210" y1="-105" y2="-105" stroke-width="7" opacity="0.45" clip-path="url(#c)"/>
    <line x1="-210" x2="210" y1="0"    y2="0"    stroke-width="7" opacity="0.45" clip-path="url(#c)"/>
    <line x1="-210" x2="210" y1="105"  y2="105"  stroke-width="7" opacity="0.45" clip-path="url(#c)"/>
    <circle cx="148" cy="148" r="52" stroke-width="10" fill="white"/>
    <line x1="188" y1="188" x2="218" y2="218" stroke-width="13" stroke-linecap="round"/>
  </g>
</svg>
